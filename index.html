<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>ໄພ້ໂກຍ — Phaikoi Card Table</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ======================= LANDING / LOBBY ======================= -->
<div id="screen-landing" class="screen">
  <div style="width:100%; max-width:440px;">
    <div class="brand">
      <div class="chip">🀄</div>
      <h1>ໄພ້ໂກຍ</h1>
      <p>ຫຼິ້ນໄພ່ອອນລາຍ ຫຼື ອອບລາຍ (Jail Theme)</p>
    </div>

    <div class="card-panel prison-theme">
      <div class="tabs">
        <button id="tab-create" class="active">ສ້າງຫ້ອງ</button>
        <button id="tab-join">ເຂົ້າຮ່ວມ</button>
        <button id="tab-offline">ອອບລາຍ</button>
      </div>

      <div id="err-landing" class="error-msg hidden"></div>

      <div class="field">
        <label for="input-name">ຊື່ນັກໂທດ (ຊື່ຂອງທ່ານ)</label>
        <input id="input-name" maxlength="16" placeholder="ເຊັ່ນ: ນັກໂທດ A" />
      </div>

      <!-- create panel -->
      <div id="panel-create">
        <div class="field">
          <label>ຈຳນວນຜູ້ຫຼິ້ນ</label>
          <div class="seat-choice" id="create-seat-choice">
            <button data-n="2">2</button>
            <button data-n="3">3</button>
            <button data-n="4" class="active">4</button>
            <button data-n="5">5</button>
          </div>
        </div>
        <div class="field">
          <label for="create-code">ຕັ້ງລະຫັດຫ້ອງ (4 ຕົວເລກ)</label>
          <input id="create-code" class="code-input" maxlength="4" inputmode="numeric" placeholder="0000" />
        </div>
        <button id="btn-create-room" class="btn-primary" style="width:100%;">ສ້າງຫ້ອງຄຸມຂັງ &amp; ລໍຖ້າໝູ່</button>
      </div>

      <!-- join panel -->
      <div id="panel-join" class="hidden">
        <div class="field">
          <label>ໂໝດຈຳນວນຜູ້ຫຼິ້ນຂອງຫ້ອງ</label>
          <div class="seat-choice" id="join-seat-choice">
            <button data-n="2">2</button>
            <button data-n="3">3</button>
            <button data-n="4" class="active">4</button>
            <button data-n="5">5</button>
          </div>
        </div>
        <div class="field">
          <label for="join-code">ລະຫັດຫ້ອງ (4 ຕົວເລກ)</label>
          <input id="join-code" class="code-input" maxlength="4" inputmode="numeric" placeholder="0000" />
        </div>
        <button id="btn-join-room" class="btn-primary" style="width:100%;">ເຂົ້າຫ້ອງຄຸມຂັງ</button>
      </div>

      <!-- offline panel -->
      <div id="panel-offline" class="hidden">
         <div class="field">
          <label>ຈຳນວນບອດ (Bots)</label>
          <div class="seat-choice" id="offline-seat-choice">
            <button data-n="2">2</button>
            <button data-n="3">3</button>
            <button data-n="4" class="active">4</button>
          </div>
        </div>
        <button id="btn-play-offline" class="btn-primary" style="width:100%;">ຫຼິ້ນອອບລາຍກັບບອດ</button>
      </div>
    </div>
  </div>
</div>
<!-- ສ່ວນອື່ນໆຄົງເດີມ... (Waiting Room, Game Table) -->
